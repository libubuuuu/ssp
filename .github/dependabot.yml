version: 2
updates:
  # 后端 Python 依赖
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps(backend)"
    # 安全补丁不受 limit 限制,任何漏洞都会单独开 PR
    groups:
      backend-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # 前端 npm 依赖
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps(frontend)"
    # Next/React 这种主版本不要自动 PR(刚 GA,踩坑风险高)
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions 自身
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"
