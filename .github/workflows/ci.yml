name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 允许并发 PR;同一分支最新 push 取消旧 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend - pytest + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests || true   # Phase 1 不阻塞,先收集警告

      - name: Security audit (pip-audit)
        # 基线已清零(2026-04-27),强制阻塞 — 新增依赖带 CVE 直接 fail-build
        run: pip-audit -r requirements.txt

      - name: Run tests
        env:
          # conftest 也会 setdefault,但显式给一份避免未来配置漂移
          JWT_SECRET: ci-test-jwt-secret-not-for-prod
          FAL_KEY: ci-test-fake-fal-key
        run: pytest -v

  frontend-lint:
    name: Frontend - lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Phase 1 不阻塞:既存 src/ 代码 58 errors + 50 warnings 全是历史代码风格
        # (setState in effect / no-explicit-any 等),修复需独立专项;先收集
        # 跟后端 ruff 同模式(也是 || true)
        run: npm run lint || true

      - name: Security audit (npm audit)
        # 强制阻塞 high 及以上(2026-04-27 next 16.2.4 升级后 0 high 基线达成)
        # 剩 5 个 moderate 全卡 upstream(postcss / prisma 链),npm 推荐降级方案荒谬
        # 不接受;新增 high CVE 必 fail-build
        run: npm audit --audit-level=high
