# SSP 日志轮转配置
# 安装位置:/etc/logrotate.d/ssp
# 防止 /var/log/ssp-* 日志无限大撑爆磁盘

/var/log/ssp-watchdog.log
/var/log/ssp-watchdog-alerts.log
/var/log/ssp-synthetic-test.log
/var/log/ssp-backup.log
/var/log/ssp-backend-blue.out.log
/var/log/ssp-backend-blue.err.log
/var/log/ssp-backend-green.out.log
/var/log/ssp-backend-green.err.log
/var/log/ssp-frontend-blue.out.log
/var/log/ssp-frontend-blue.err.log
/var/log/ssp-frontend-green.out.log
/var/log/ssp-frontend-green.err.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
}

# 说明(不在 logrotate 解析范围,放最后):
# - daily:每天轮转
# - rotate 14:保留 14 份(2 周)
# - compress + delaycompress:gzip 旧日志,最近一份不压
# - copytruncate:复制+截断,supervisor 不需重启
# - dateext:旧日志带日期后缀(ssp-watchdog.log-20260427.gz)
