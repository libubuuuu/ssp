server {
    server_name ailixiao.com www.ailixiao.com;

    client_max_body_size 500m;

    
    location ~ ^/api/(auth/login|auth/register) {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        # 限流:60r/s 平均 + 短时冲 200(多 tab + polling + 拦截器 retry 大方放过)
        limit_req zone=api_limit burst=200 nodelay;

        # 大文件上传 / 慢请求宽容(防 connection reset)
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 500m;
        client_body_timeout 120s;

        # 限流 / 上游错误一律返 JSON,前端 .json() 不再炸
        error_page 429 = @rate_limited;
        error_page 502 503 504 = @upstream_error;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 自定义错误响应(JSON,前端能正确解析)
    location @rate_limited {
        default_type application/json;
        add_header Retry-After 5 always;
        return 429 '{"detail":"请求过于频繁,请稍后重试","code":"rate_limited"}';
    }
    location @upstream_error {
        default_type application/json;
        return 503 '{"detail":"服务暂时不可用,请稍后重试","code":"upstream_error"}';
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ailixiao.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ailixiao.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;


}
server {
    if ($host = www.ailixiao.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = ailixiao.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ailixiao.com www.ailixiao.com;
    return 404; # managed by Certbot




}

